<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bruno Mars Countdown</title>

<link rel="icon" href="icono.png">

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial, sans-serif;
text-align:center;
overflow:hidden;
display:flex;
flex-direction:column;
align-items:center;
}

/* TEXTO SUPERIOR */
.titulo-superior{
margin-top:12px;
font-size:26px;
letter-spacing:2px;
}

/* TITULO */
h1{
font-size:58px;
margin:8px 0;
color:white;
-webkit-text-stroke:2px black;
text-shadow:0 0 10px black;
}

/* MODO SHOW */
.show{
background:url("escenario.png") center center / cover no-repeat fixed;
color:#f4e3a3;
}

.show h1{
color:#f2d27c;
text-shadow:2px 2px 0 #1f3d2b,4px 4px 0 #000;
}

.show .titulo-superior{
color:#9bbf7a;
text-shadow:1px 1px 3px black;
}

/* CONTADOR */
#contador{
font-size:55px;
margin:10px;
}

.show #contador{
color:#f2d27c;
-webkit-text-stroke:2px #1f3d2b;
text-shadow:2px 2px 0 #1f3d2b,4px 4px 0 #000;
}

/* HORA */
#horaCDMX{
font-size:22px;
margin-top:5px;
opacity:0.9;
}

/* BARRA */
.barra{
width:500px;
height:25px;
background:rgba(255,255,255,0.2);
border-radius:20px;
overflow:hidden;
margin:10px auto;
}

.progreso{
height:100%;
width:0%;
background:linear-gradient(90deg,#ff00ff,#ff4da6);
}

/* BOTONES */
.botones{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:12px;
margin-top:20px;
}

.boton{
padding:12px 24px;
font-size:18px;
border-radius:20px;
border:none;
background:#ff4da6;
color:white;
cursor:pointer;
box-shadow:0 0 10px #ff4da6;
}

.show .boton{
background:#c79a3b;
color:black;
border:2px solid #1f3d2b;
}

/* MODO 200 */
.modo200{
background:url("silla50.png") center center / cover no-repeat fixed;
}

.modo200 h1{
color:#ff2b2b;
-webkit-text-stroke:2px black;
text-shadow:2px 2px 0 black;
}

.modo200 #contador{
color:#55cfff;
-webkit-text-stroke:2px black;
}

.modo200 .boton{
background:linear-gradient(90deg,#ff0000,#ff3b3b,#ff6a00);
color:white;
}

/* ========================= */
/* MODO 50 DIAS */
/* ========================= */

.modo50{
background:url("apt.png") center center / cover no-repeat fixed;
}

/* ocultar textos */
.modo50 .titulo-superior,
.modo50 h1{
display:none;
}

/* posicion */
.modo50 #contador{
margin-top:30px;
}

.modo50 #horaCDMX{
margin-top:5px;
}

.modo50 .barra{
margin-top:10px;
}

/* lava rosa */
.modo50 .boton{
background:linear-gradient(45deg,#ff00cc,#ff4da6,#ff00cc);
color:white;
border:2px solid #ff00cc;
box-shadow:0 0 10px #ff00cc,0 0 20px #ff4da6;
}

.modo50 .progreso{
background:linear-gradient(45deg,#ff00cc,#ff4da6,#ff00cc);
box-shadow:0 0 10px #ff00cc,0 0 20px #ff4da6;
}

.modo50 canvas{
display:none;
}

/* ESTRELLAS */
canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* ROSAS */
#rosas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}

.rosa{
position:absolute;
top:-50px;
font-size:24px;
animation:caer 8s linear;
}

@keyframes caer{
to{transform:translateY(110vh);}
}

</style>
</head>

<body>

<canvas id="stars"></canvas>
<div id="rosas"></div>

<div class="titulo-superior">
Bruno Mars Concierto en el Estadio GNP Seguros
</div>

<h1>BRUNO MARS LIVE</h1>

<div id="contador"></div>
<div id="horaCDMX"></div>

<div class="barra">
<div class="progreso" id="progreso"></div>
</div>

<div class="botones">
<button class="boton" onclick="window.open('https://www.youtube.com/watch?v=1iBm60uJXvs','_blank')">Liquor Store Blues</button>
<button class="boton" onclick="window.open('https://www.youtube.com/watch?v=4J41KdZ3JR8','_blank')">Radio de Bruno Mars</button>
<button class="boton" onclick="window.open('https://www.youtube.com/watch?v=mrV8kK5t0V8','_blank')">Justmight</button>
<button class="boton" onclick="window.open('https://www.youtube.com/watch?v=lY5V4hSLWY8','_blank')">Risk It All</button>
</div>

<script>

/* CONTADOR */

const fechaObjetivo=new Date("December 8, 2026 14:30:00 GMT-0600").getTime();
const inicio=new Date("March 13, 2026").getTime();
const progreso=document.getElementById("progreso");

setInterval(function(){

const ahora=new Date().getTime();
const diferencia=fechaObjetivo-ahora;

const dias=Math.floor(diferencia/(1000*60*60*24));
const horas=Math.floor((diferencia%(1000*60*60*24))/(1000*60*60));
const minutos=Math.floor((diferencia%(1000*60*60))/(1000*60));
const segundos=Math.floor((diferencia%(1000*60))/1000);

document.getElementById("contador").innerHTML=
dias+"d "+horas+"h "+minutos+"m "+segundos+"s";

/* progreso */
const total=fechaObjetivo-inicio;
const pasado=ahora-inicio;
progreso.style.width=(pasado/total*100)+"%";

/* LIMPIAR MODOS */
document.body.classList.remove("modo50","show","modo200");

/* MODOS */
if(dias<=50){
document.body.classList.add("modo50");
document.getElementById("stars").style.display="none";
}
else if(dias<=100){
document.body.classList.add("show");
document.getElementById("stars").style.display="none";
}
else if(dias<=200){
document.body.classList.add("modo200");
document.getElementById("stars").style.display="none";
}
else{
document.getElementById("stars").style.display="block";
}

/* HORA */
const horaCDMX=new Date().toLocaleTimeString("es-MX",{timeZone:"America/Mexico_City"});
document.getElementById("horaCDMX").innerHTML="CDMX: "+horaCDMX;

},1000);

/* ESTRELLAS */

const canvas=document.getElementById("stars");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let estrellas=[];

for(let i=0;i<200;i++){
estrellas.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2
});
}

function animar(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="white";

estrellas.forEach(e=>{
ctx.beginPath();
ctx.arc(e.x,e.y,e.r,0,Math.PI*2);
ctx.fill();
e.y+=0.2;
if(e.y>canvas.height)e.y=0;
});

requestAnimationFrame(animar);
}

animar();

</script>

</body>
</html>
