<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bruno Mars Countdown</title>

<link rel="icon" href="icono.png">

<style>

body{
margin:0;
min-height:100vh;
background:black;
color:white;
font-family:Arial, sans-serif;
text-align:center;
overflow:hidden;
display:flex;
flex-direction:column;
align-items:center;
}

/* TEXTO SUPERIOR */

.titulo-superior{
margin-top:12px;
font-size:26px;
letter-spacing:2px;
}

/* TITULO */

h1{
font-size:58px;
margin:8px 0;
color:white;
-webkit-text-stroke:2px black;
text-shadow:0 0 10px black;
}

/* MODO 10 DIAS */

.modo10{
background:url("24kmagic.png") center center / cover no-repeat fixed;
}

.modo10 h1{
display:none;
}

.modo10 .titulo-superior{
display:none;
}

.modo10 #contador{
margin-top:110px;
color:#b9923b;
-webkit-text-stroke:1px rgba(70,50,10,0.95);
text-shadow:
2px 2px 0 rgba(60,45,10,0.75),
0 0 6px rgba(0,0,0,0.25);
}

.modo10 #horaCDMX{
color:#8f6f1f;
-webkit-text-stroke:1px rgba(50,35,10,0.9);
text-shadow:
1px 1px 0 rgba(0,0,0,0.45),
0 0 6px rgba(0,0,0,0.25);
}

.modo10 .barra{
margin-top:18px;
background:rgba(100,75,20,0.35);
}

.modo10 .progreso{
background:linear-gradient(90deg,#7f6314,#caa447,#e2c15b,#a07c1a);
}

.modo10 .botones{
margin-top:22px;
margin-bottom:3cm;
}

.modo10 .boton{
background:linear-gradient(135deg,#7b5f17 0%,#c8a243 45%,#9a7820 100%);
color:#fff7da;
box-shadow:
0 0 8px rgba(202,164,67,0.35),
0 0 14px rgba(123,95,23,0.22);
border:1px solid rgba(255,255,255,0.2);
}

.modo10 .boton:hover{
filter:brightness(1.05);
}

.modo10 .tv{
display:none;
}

/* MODO 50 */
.modo50{
background:url("apt.png") center center / cover no-repeat fixed;
}

.modo50 h1{
visibility:hidden;
}

.modo50 .titulo-superior{
visibility:hidden;
}

.modo50 #contador{
margin-top:110px;
color:#ffe6f0;
-webkit-text-stroke:1px rgba(120,40,70,0.85);
text-shadow:
0 0 10px rgba(255,255,255,0.25),
2px 2px 0 rgba(120,40,70,0.9);
}

.modo50 #horaCDMX{
color:#fff7fb;
-webkit-text-stroke:1px rgba(120,40,70,0.75);
text-shadow:0 0 8px rgba(255,255,255,0.25);
}

.modo50 .barra{
margin-top:18px;
}

.modo50 .botones{
margin-top:22px;
margin-bottom:3cm;
}

.modo50 .progreso{
background:linear-gradient(90deg,#ff8fb8,#ff4d92,#ffb3d1);
}

.modo50 .boton{
background:linear-gradient(135deg,#ff9ac4 0%,#ff6ea9 48%,#ffb0d4 100%);
color:white;
box-shadow:
0 0 10px rgba(255,110,169,0.55),
0 0 18px rgba(255,154,196,0.35);
border:1px solid rgba(255,255,255,0.35);
}

.modo50 .boton:hover{
filter:brightness(1.05);
}

.modo50 .boton-apt{
display:inline-block;
}

.modo50 .tv{
display:none;
}

/* CONTADOR */

#contador{
font-size:55px;
margin:10px;
}

/* HORA */

#horaCDMX{
font-size:22px;
margin-top:5px;
opacity:0.9;
}

/* MODO SHOW */

.show{
background:url("escenario.png") center center / cover no-repeat fixed;
color:#f4e3a3;
}

.show h1{
color:#f2d27c;
text-shadow:
2px 2px 0 #1f3d2b,
4px 4px 0 #000;
}

.show .titulo-superior{
color:#9bbf7a;
text-shadow:1px 1px 3px black;
}

.show #contador{
color:#f2d27c;
-webkit-text-stroke:2px #1f3d2b;
text-shadow:
2px 2px 0 #1f3d2b,
4px 4px 0 #000;
}

.show #horaCDMX{
color:white;
-webkit-text-stroke:2px black;
text-shadow:0 0 10px black;
}

.show .barra{
background:rgba(255,255,255,0.2);
}

.show .progreso{
background:linear-gradient(90deg,#ff00ff,#ff4da6);
}

.show .boton{
background:#ff4da6;
color:white;
box-shadow:0 0 10px #ff4da6;
border:none;
}

.show canvas{
display:none;
}

.show .tv{
display:none;
}

/* BARRA */

.barra{
width:500px;
height:25px;
background:rgba(255,255,255,0.2);
border-radius:20px;
overflow:hidden;
margin:10px auto;
}

.progreso{
height:100%;
width:0%;
background:linear-gradient(90deg,#ff00ff,#ff4da6);
}

/* BOTONES */

.botones{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:12px;
margin-top:20px;
}

.boton{
padding:12px 24px;
font-size:18px;
border-radius:20px;
border:none;
background:#ff4da6;
color:white;
cursor:pointer;
box-shadow:0 0 10px #ff4da6;
}

/* TV */

.tv span{
font-size:200px;
margin-top:15px;
}

.show .tv{
display:none;
}

#rosas,
#rayos{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
overflow:hidden;
z-index:3;
}

.rosa,
.rayo{
position:absolute;
top:-60px;
font-size:24px;
animation:caerElemento linear forwards;
}

.rayo{
font-size:28px;
filter:drop-shadow(0 0 6px rgba(255,255,200,0.95));
}

@keyframes caerElemento{
0%{
transform:translateY(-60px) rotate(0deg);
opacity:1;
}
100%{
transform:translateY(110vh) rotate(360deg);
opacity:0.95;
}
}

/* ESTRELLAS */

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* MODO 200 */

.modo200{
background:url("silla50.png") center center / cover no-repeat fixed;
}

.modo200 h1{
color:#ff2b2b;
-webkit-text-stroke:2px black;
text-shadow:2px 2px 0 black;
}

.modo200 .titulo-superior{
color:#00ffaa;
-webkit-text-stroke:1px black;
}

.modo200 #contador{
color:#55cfff;
-webkit-text-stroke:2px black;
text-shadow:2px 2px 0 black;
}

.modo200 #horaCDMX{
color:white;
-webkit-text-stroke:0;
text-shadow:none;
}

.modo200 .barra{
background:rgba(0,0,0,0.4);
}

.modo200 .progreso{
background:linear-gradient(
90deg,
#ff0000,
#ff3b3b,
#ff0000,
#ff6a00
);
box-shadow:
0 0 10px red,
0 0 20px red,
0 0 30px red;
}

.modo200 .boton{
background:linear-gradient(
90deg,
#ff0000,
#ff3b3b,
#ff0000,
#ff6a00
);
color:white;
box-shadow:
0 0 10px red,
0 0 20px red;
border:2px solid black;
}

.modo200 canvas{
display:none;
}

.modo200 .tv{
display:none;
}

/* CODIGO SECRETO */

.secreto{
position:fixed;
bottom:15px;
right:15px;
background:transparent;
z-index:1000;
text-align:right;
}

.secreto input{
background:transparent;
border:1px solid rgba(255,255,255,0.4);
color:white;
padding:4px 6px;
border-radius:6px;
outline:none;
}

.secreto button{
background:transparent;
border:none;
font-size:18px;
cursor:pointer;
color:white;
}

</style>
</head>

<body>

<canvas id="stars"></canvas>
<div id="rosas"></div>
<div id="rayos"></div>

<div class="titulo-superior">
Bruno Mars Concierto en el Estadio GNP Seguros
</div>

<h1>BRUNO MARS LIVE</h1>

<div id="contador"></div>
<div id="horaCDMX"></div>

<div class="barra">
<div class="progreso" id="progreso"></div>
</div>

<div class="botones">
<button class="boton">Liquor Store Blues</button>
<button class="boton">Radio de Bruno Mars</button>
<button class="boton">I Just Might</button>

<button class="boton boton-apt"
onclick="window.open('https://www.youtube.com/watch?v=ekr2nIex040','_blank')">
Apt.
</button>

<button class="boton boton-24k"
onclick="window.open('https://www.youtube.com/watch?v=UqyT8IEBkvY','_blank')">
24K Magic
</button>
</div>

<div class="tv">
<span>📺</span>
</div>

<div class="secreto">
<button onclick="abrirSecreto()">🤫</button><br>
<input id="codigoSecreto" placeholder="..." onkeydown="detectarEnter(event)">
</div>

<script>

/* ESTADO MANUAL */
let modoManual = null;

/* FECHAS */

const fechaObjetivo = new Date("2026-12-08T14:30:00-06:00");
const inicio = new Date("2026-03-13T00:00:00-06:00");
const progreso = document.getElementById("progreso");

function plural(numero, singular, pluralTexto){
return numero === 1 ? singular : pluralTexto;
}

function sumarMeses(fecha, meses){
const d = new Date(fecha);
const diaOriginal = d.getDate();
d.setMonth(d.getMonth() + meses);

if(d.getDate() < diaOriginal){
d.setDate(0);
}

return d;
}

function obtenerTiempoRestante(){
const ahora = new Date();

if(ahora >= fechaObjetivo){
return { meses:0, dias:0, horas:0, minutos:0 };
}

let meses =
(fechaObjetivo.getFullYear() - ahora.getFullYear()) * 12 +
(fechaObjetivo.getMonth() - ahora.getMonth());

let base = sumarMeses(ahora, meses);

while(base > fechaObjetivo){
meses--;
base = sumarMeses(ahora, meses);
}

let restanteMs = fechaObjetivo - base;

const dias = Math.floor(restanteMs / (1000 * 60 * 60 * 24));
restanteMs %= (1000 * 60 * 60 * 24);

const horas = Math.floor(restanteMs / (1000 * 60 * 60));
restanteMs %= (1000 * 60 * 60);

const minutos = Math.floor(restanteMs / (1000 * 60));

return { meses, dias, horas, minutos };
}

function aplicarModo(diasRestantes){
document.body.classList.remove("show", "modo200", "modo50", "modo10");

let modoActivo = null;

if(modoManual !== null){
modoActivo = modoManual;
}
else if(diasRestantes <= 10){
modoActivo = "modo10";
}
else if(diasRestantes <= 50){
modoActivo = "modo50";
}
else if(diasRestantes <= 100){
modoActivo = "show";
}
else if(diasRestantes <= 200){
modoActivo = "modo200";
}

if(modoActivo){
document.body.classList.add(modoActivo);
}
}

function actualizarTodo(){

const ahora = new Date();
const diferenciaMs = fechaObjetivo - ahora;

const tiempo = obtenerTiempoRestante();

document.getElementById("contador").textContent =
tiempo.meses + " " + plural(tiempo.meses, "mes", "meses") + " " +
tiempo.dias + " " + plural(tiempo.dias, "día", "días") + " " +
tiempo.horas + " " + plural(tiempo.horas, "hora", "horas") + " " +
tiempo.minutos + " " + plural(tiempo.minutos, "minuto", "minutos");

const total = fechaObjetivo.getTime() - inicio.getTime();
const pasado = ahora.getTime() - inicio.getTime();

let porcentaje = (pasado / total) * 100;
porcentaje = Math.max(0, Math.min(100, porcentaje));
progreso.style.width = porcentaje + "%";

const diasRestantes = Math.floor(diferenciaMs / (1000 * 60 * 60 * 24));
aplicarModo(diasRestantes);

const horaCDMX = new Date().toLocaleTimeString("es-MX",{
timeZone:"America/Mexico_City"
});

document.getElementById("horaCDMX").innerHTML = "CDMX: " + horaCDMX;
}

setInterval(actualizarTodo, 1000);
actualizarTodo();

/* ESTRELLAS */

const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

function ajustarCanvas(){
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
}

ajustarCanvas();

let estrellas = [];

for(let i=0;i<200;i++){
estrellas.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2
});
}

function animar(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="white";

estrellas.forEach(e=>{
ctx.beginPath();
ctx.arc(e.x,e.y,e.r,0,Math.PI*2);
ctx.fill();

e.y+=0.2;
if(e.y>canvas.height)e.y=0;
});

requestAnimationFrame(animar);

}

animar();

/* ROSAS Y RAYOS */

function crearRosa(){
const rosa=document.createElement("div");
rosa.className="rosa";
rosa.textContent="🌹";
rosa.style.left=Math.random()*100+"vw";
rosa.style.animationDuration=(5+Math.random()*4)+"s";
rosa.style.fontSize=(20+Math.random()*18)+"px";
document.getElementById("rosas").appendChild(rosa);
setTimeout(()=>rosa.remove(),9000);
}

function crearRayo(){
const rayo=document.createElement("div");
rayo.className="rayo";
rayo.textContent="⚡";
rayo.style.left=Math.random()*100+"vw";
rayo.style.animationDuration=(2.8+Math.random()*2)+"s";
rayo.style.fontSize=(22+Math.random()*18)+"px";
rayo.style.transform=`rotate(${Math.random()*50-25}deg)`;
document.getElementById("rayos").appendChild(rayo);
setTimeout(()=>rayo.remove(),6000);
}

setInterval(()=>{
if(document.body.classList.contains("show") || document.body.classList.contains("modo200")){
crearRosa();
}
if(document.body.classList.contains("modo50")){
crearRayo();
}
},500);

window.addEventListener("resize",()=>{
ajustarCanvas();
});
  
/* CODIGO SECRETO */

function abrirSecreto(){
document.getElementById("codigoSecreto").focus();
}

function detectarEnter(e){
if(e.key==="Enter"){
const codigo = document.getElementById("codigoSecreto").value.toLowerCase().trim();

if(codigo==="apt"){
modoManual = "modo50";
}

if(codigo==="24k"){
modoManual = "modo10";
}

if(codigo==="justmight"){
modoManual = "show";
}

if(codigo==="riskitall"){
modoManual = "modo200";
}

if(codigo==="mars"){
modoManual = null;
}

document.getElementById("codigoSecreto").value = "";
actualizarTodo();
}
}

</script>

</body>
</html>
