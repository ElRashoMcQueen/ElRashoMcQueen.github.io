<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bruno Mars Countdown</title>

<link rel="icon" href="icono.png">

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial, sans-serif;
text-align:center;
overflow:hidden;
display:flex;
flex-direction:column;
align-items:center;
}

/* TITULO */

h1{
font-size:58px;
margin:8px 0;
color:white;
-webkit-text-stroke:2px black;
text-shadow:0 0 10px black;
}

/* CONTADOR */

#contador{
font-size:55px;
margin:10px;
}

/* HORA (NEGRA) */

#horaCDMX{
font-size:22px;
margin-top:5px;
opacity:0.9;
color:black;
}

/* BARRA */

.barra{
width:500px;
height:25px;
background:rgba(255,255,255,0.2);
border-radius:20px;
overflow:hidden;
margin:10px auto;
}

.progreso{
height:100%;
width:0%;
}

/* 🔥 LAVA ROSA */

@keyframes lava{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.lava{
background:linear-gradient(270deg,#ff4da6,#ff99cc,#ff66b2);
background-size:600% 600%;
animation:lava 6s ease infinite;
}

/* BOTONES */

.botones{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:12px;
margin-top:20px;
}

.boton{
padding:12px 24px;
font-size:18px;
border-radius:20px;
border:none;
color:white;
cursor:pointer;
box-shadow:0 0 10px #ff4da6;
}

/* TV */

.tv span{
font-size:200px;
margin-top:15px;
}

/* ESTRELLAS */

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* MODO 50 */

.modo50{
background:#ffc1da;
}

.modo50 h1{
color:#ff4da6;
}

/* MODO 200 (se mantiene igual) */

.modo200{
background:url("silla50.png") center center / cover no-repeat fixed;
}

.modo200 canvas{
display:none;
}

/* SECRETO */

.secreto{
position:fixed;
bottom:15px;
right:15px;
z-index:1000;
}

.secreto input{
background:transparent;
border:1px solid rgba(255,255,255,0.4);
color:white;
padding:4px;
}

/* ROSAS */

#rosas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:3;
}

.rosa{
position:absolute;
top:-50px;
animation:caer linear forwards;
}

@keyframes caer{
0%{transform:translateY(-50px);}
100%{transform:translateY(110vh);}
}

</style>
</head>

<body>

<canvas id="stars"></canvas>
<div id="rosas"></div>

<h1>BRUNO MARS</h1>

<div id="contador"></div>
<div id="horaCDMX"></div>

<div class="barra lava">
<div class="progreso lava" id="progreso"></div>
</div>

<div class="botones">

<button class="boton lava">Liquor Store Blues</button>
<button class="boton lava">Radio de Bruno Mars</button>
<button class="boton lava">I Just Might</button>

<button class="boton lava"
onclick="window.open('https://www.youtube.com/watch?v=ekr2nIex040&list=RDekr2nIex040&start_radio=1','_blank')">
🎵 APT
</button>

</div>

<div class="tv">
<span>📺</span>
</div>

<div class="secreto">
<input id="codigoSecreto" onkeydown="detectarEnter(event)">
</div>

<script>

/* CONTADOR */

const fechaObjetivo=new Date("December 8, 2026 14:30:00 GMT-0600").getTime();
const inicio=new Date("March 13, 2026").getTime();

const progreso=document.getElementById("progreso");

setInterval(function(){

const ahora=new Date().getTime();
const diferencia=fechaObjetivo-ahora;

const dias=Math.floor(diferencia/(1000*60*60*24));
const horas=Math.floor((diferencia%(1000*60*60*24))/(1000*60*60));
const minutos=Math.floor((diferencia%(1000*60*60))/(1000*60));
const segundos=Math.floor((diferencia%(1000*60))/1000);

document.getElementById("contador").innerHTML=
dias+"d "+horas+"h "+minutos+"m "+segundos+"s";

const total=fechaObjetivo-inicio;
const pasado=ahora-inicio;

progreso.style.width=(pasado/total*100)+"%";

/* 🔥 MODO 50 */

if(dias<=50){
document.body.classList.add("modo50");
}

/* HORA */

const horaCDMX=new Date().toLocaleTimeString("es-MX",{
timeZone:"America/Mexico_City"
});

document.getElementById("horaCDMX").innerHTML="CDMX: "+horaCDMX;

},1000);

/* ESTRELLAS */

const canvas=document.getElementById("stars");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let estrellas=[];

for(let i=0;i<200;i++){
estrellas.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2
});
}

function animar(){
ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="white";

estrellas.forEach(e=>{
ctx.beginPath();
ctx.arc(e.x,e.y,e.r,0,Math.PI*2);
ctx.fill();

e.y+=0.2;
if(e.y>canvas.height)e.y=0;
});

requestAnimationFrame(animar);
}

animar();

/* ROSAS */

function crearRosa(){
const rosa=document.createElement("div");
rosa.classList.add("rosa");
rosa.innerHTML="🌹";
rosa.style.left=Math.random()*100+"vw";
rosa.style.animationDuration=(5+Math.random()*5)+"s";
document.getElementById("rosas").appendChild(rosa);

setTimeout(()=>rosa.remove(),10000);
}

setInterval(()=>crearRosa(),800);

/* CODIGO */

function detectarEnter(e){
if(e.key==="Enter"){
const codigo=document.getElementById("codigoSecreto").value;

if(codigo==="50dias"){
document.body.classList.add("modo50");
}
}
}

</script>

</body>
</html>
