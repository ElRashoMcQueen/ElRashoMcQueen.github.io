<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bruno Mars Countdown</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial;
text-align:center;
overflow:hidden;
}

/* TITULO */

h1{
font-size:60px;
margin-top:20px;
}

/* CONTADOR */

#contador{
font-size:45px;
margin-top:10px;
}

/* HORA */

#horaCDMX{
font-size:22px;
margin-top:5px;
}

/* BARRA */

.barra{
width:500px;
height:25px;
background:rgba(255,255,255,0.2);
border-radius:20px;
margin:15px auto;
overflow:hidden;
}

.progreso{
height:100%;
width:0%;
background:linear-gradient(90deg,#ff00ff,#ff4da6);
}

/* BOTONES */

.botones{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
}

.boton{
padding:10px 20px;
border:none;
border-radius:20px;
font-size:16px;
cursor:pointer;
background:#ff4da6;
color:white;
}

/* MODO 100 */

.show{
background:#111;
}

/* MODO 200 */

.modo200{
background:#000;
}

.modo200 .boton{
background:linear-gradient(90deg,#ff0000,#ff3b3b,#ff0000,#ff6a00);
color:white;
}

/* BOTON RISK */

.boton-risk{
display:none;
}

.modo200 .boton-risk{
display:inline-block;
}

/* TV */

.tv{
font-size:180px;
margin-top:20px;
}

/* ESTRELLAS */

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* ROSAS */

#rosas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}

.rosa{
position:absolute;
top:-50px;
font-size:24px;
animation:caerRosa linear forwards;
}

@keyframes caerRosa{

0%{
transform:translateY(-50px) rotate(0deg);
opacity:1;
}

100%{
transform:translateY(110vh) rotate(360deg);
opacity:0.9;
}

}

/* CODIGO SECRETO */

.secreto{
position:fixed;
bottom:15px;
right:15px;
}

.secreto input{
background:transparent;
border:1px solid rgba(255,255,255,0.4);
color:white;
padding:4px 6px;
border-radius:6px;
}

/* TEMBLOR */

@keyframes temblar{

0%{transform:translateX(0);}
25%{transform:translateX(-4px);}
50%{transform:translateX(4px);}
75%{transform:translateX(-4px);}
100%{transform:translateX(0);}

}

</style>
</head>

<body>

<canvas id="stars"></canvas>

<div id="rosas"></div>

<h1>BRUNO MARS LIVE</h1>

<div id="contador"></div>
<div id="horaCDMX"></div>

<div class="barra">
<div class="progreso" id="progreso"></div>
</div>

<div class="botones">

<button class="boton">Liquor Store Blues</button>
<button class="boton">Radio</button>
<button class="boton">I Just Might</button>

<button class="boton boton-risk"
onclick="window.open('https://www.youtube.com/watch?v=lY5V4hSLWY8','_blank')">
Risk It All
</button>

</div>

<div class="tv">📺</div>

<div class="secreto">
<input id="codigoSecreto" placeholder="..." onkeydown="detectarEnter(event)">
</div>

<script>

/* CONTADOR */

const fechaObjetivo=new Date("December 8, 2026 14:30:00 GMT-0600").getTime();

setInterval(()=>{

const ahora=new Date().getTime();
const diferencia=fechaObjetivo-ahora;

const dias=Math.floor(diferencia/(1000*60*60*24));
const horas=Math.floor((diferencia%(1000*60*60*24))/(1000*60*60));
const minutos=Math.floor((diferencia%(1000*60*60))/(1000*60));
const segundos=Math.floor((diferencia%(1000*60))/1000);

document.getElementById("contador").innerHTML=
dias+"d "+horas+"h "+minutos+"m "+segundos+"s";

/* HORA CDMX */

const horaCDMX=new Date().toLocaleTimeString("es-MX",{
timeZone:"America/Mexico_City"
});

document.getElementById("horaCDMX").innerHTML="CDMX: "+horaCDMX;

/* MODOS */

if(dias<=100){
document.body.classList.add("show");
}

if(dias<=200 && dias>100){
document.body.classList.add("modo200");
}

},1000);

/* ESTRELLAS */

const canvas=document.getElementById("stars");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let estrellas=[];

for(let i=0;i<200;i++){
estrellas.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2
});
}

function animar(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="white";

estrellas.forEach(e=>{

ctx.beginPath();
ctx.arc(e.x,e.y,e.r,0,Math.PI*2);
ctx.fill();

e.y+=0.2;
if(e.y>canvas.height)e.y=0;

});

requestAnimationFrame(animar);

}

animar();

/* ROSAS */

function crearRosa(){

const rosa=document.createElement("div");
rosa.classList.add("rosa");
rosa.innerHTML="🌹";

rosa.style.left=Math.random()*100+"vw";
rosa.style.animationDuration=(5+Math.random()*5)+"s";

document.getElementById("rosas").appendChild(rosa);

setTimeout(()=>{
rosa.remove();
},10000);

}

setInterval(()=>{

if(
document.body.classList.contains("show") ||
document.body.classList.contains("modo200")
){
crearRosa();
}

},500);

/* CODIGOS SECRETOS */

function detectarEnter(e){

if(e.key==="Enter"){

const input=document.getElementById("codigoSecreto");
const codigo=input.value.toLowerCase();

/* CODIGOS CORRECTOS */

if(codigo==="justmight"){
document.body.classList.add("show");
input.value="";
return;
}

if(codigo==="riskitall"){
document.body.classList.add("modo200");
input.value="";
return;
}

if(codigo==="mars"){
document.body.classList.remove("show");
document.body.classList.remove("modo200");
input.value="";
return;
}

/* INCORRECTO */

input.value="INCORRECTO";
input.style.color="red";
input.style.animation="temblar 0.4s";

setTimeout(()=>{

input.value="";
input.style.color="white";
input.style.animation="none";

},1000);

}

}

</script>

</body>
</html>
