<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bruno Mars Countdown</title>
<link rel="icon" href="icono.png">
<style>
  :root{
    --lava-1: #ff2b8f;
    --lava-2: #ff5da6;
    --vintage-green: #9bbf7a;
    --vintage-gold: #d6b45f;
    --show-title-color: #f2d27c; /* color de BRUNO MARS LIVE en modo show (100 días) */
  }

  /* reset / básico */
  body{
    margin:0;
    background:black;
    color:white;
    font-family:Arial, sans-serif;
    text-align:center;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  /* Contenedor elementos principales (facilita bajar en modo50) */
  .main-wrap{
    width:100%;
    max-width:1100px;
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  /* TEXTO SUPERIOR */
  .titulo-superior{
    margin-top:12px;
    font-size:26px;
    letter-spacing:2px;
  }

  /* TITULO */
  h1{
    font-size:58px;
    margin:8px 0;
    color:white;
    -webkit-text-stroke:2px black;
    text-shadow:0 0 10px black;
  }

  /* MODO SHOW (100 dias) */
  .show{
    background:url("escenario.png") center center / cover no-repeat fixed;
    color:#f4e3a3;
  }
  .show h1{
    color:var(--show-title-color);
    text-shadow:
      2px 2px 0 #1f3d2b,
      4px 4px 0 #000;
  }
  .show .titulo-superior{
    color:#9bbf7a;
    text-shadow:1px 1px 3px black;
  }
  /* contador en modo 100 toma mismo color que el título */
  .show #contador{
    color:var(--show-title-color);
    -webkit-text-stroke:2px #1f3d2b;
    text-shadow:
      2px 2px 0 #1f3d2b,
      4px 4px 0 #000;
  }
  /* botones modo 100: verde vintage + dorado vintage */
  .show .boton{
    background: linear-gradient(90deg, var(--vintage-green), var(--vintage-gold));
    color: black;
    border: 2px solid rgba(0,0,0,0.6);
    box-shadow: 0 6px 18px rgba(0,0,0,0.5);
  }

  /* MODO 200 */
  .modo200{
    background:url("silla50.png") center center / cover no-repeat fixed;
  }
  .modo200 h1{
    color:#ff2b2b;
    -webkit-text-stroke:2px black;
    text-shadow:2px 2px 0 black;
  }
  .modo200 .titulo-superior{
    color:#00ffaa;
    -webkit-text-stroke:1px black;
  }
  .modo200 #contador{
    color:#55cfff;
    -webkit-text-stroke:2px black;
    text-shadow:2px 2px 0 black;
  }
  .modo200 .barra{
    background:rgba(0,0,0,0.4);
  }
  .modo200 .progreso{
    background:linear-gradient(90deg,#ff0000,#ff3b3b,#ff0000,#ff6a00);
    box-shadow:0 0 10px red,0 0 20px red,0 0 30px red;
  }
  .modo200 .boton{
    background:linear-gradient(90deg,#ff0000,#ff3b3b,#ff0000,#ff6a00);
    color:white;
    box-shadow:0 0 10px red,0 0 20px red;
    border:2px solid black;
  }

  /* MODO 50 (apt) */
  .modo50{
    background:url("apt.png") center center / cover no-repeat fixed;
  }

  /* Ocultar título y subtítulo en modo50 */
  .modo50 h1,
  .modo50 .titulo-superior{
    display:none;
  }

  /* Quitar rosas en modo50 se gestiona vía JS (no crear rosas) */

  /* Layout vertical SOLO para modo50: contador -> hora -> barra -> botones.
     Aquí aplicamos márgenes distintos para colocarlos verticalmente. */
  .modo50 .main-wrap{
    align-items:center;
  }
  .modo50 #contador{
    margin-top:40px; /* contador un poco más abajo */
  }
  .modo50 #horaCDMX{
    margin-top:10px; /* justo debajo del contador */
  }
  .modo50 .barra{
    margin-top:14px; /* debajo de la hora */
  }
  .modo50 .botones{
    margin-top:14px; /* botones abajo de la barra */
    flex-direction:column; /* apilar verticalmente si lo deseas; si prefieres fila quitar esto */
    gap:12px;
  }

  /* Barra de progreso (base) */
  .barra{
    width:500px;
    max-width:90%;
    height:25px;
    background:rgba(255,255,255,0.2);
    border-radius:20px;
    overflow:hidden;
    margin:10px auto;
  }

  .progreso{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#ff00ff,#ff4da6); /* default */
    transition: width 0.6s linear;
  }

  /* En modo50 la barra y los botones comparten el mismo degradado (lava) */
  .modo50 .progreso{
    background: linear-gradient(45deg, var(--lava-1), var(--lava-2), var(--lava-1));
    box-shadow: 0 0 15px var(--lava-1), 0 0 30px var(--lava-2);
  }
  .modo50 .boton,
  .modo50 .boton-apt{
    background: linear-gradient(45deg, var(--lava-1), var(--lava-2), var(--lava-1));
    color: white;
    border: 2px solid var(--lava-1);
    box-shadow: 0 0 15px var(--lava-1), 0 0 30px var(--lava-2);
  }

  /* Botones base */
  .botones{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:12px;
    margin-top:20px;
  }
  .boton{
    padding:12px 24px;
    font-size:18px;
    border-radius:20px;
    border:none;
    background:#ff4da6;
    color:white;
    cursor:pointer;
    box-shadow:0 0 10px #ff4da6;
  }
  .boton-apt{
    display:none;
    padding:12px 24px;
    border-radius:20px;
    border:none;
    cursor:pointer;
  }

  /* TV (emoji) - por defecto oculto; lo mostramos SOLO desde JS cuando sea "modo estrellas" */
  .tv{ display:none; }
  .tv span{
    font-size:200px;
    margin-top:15px;
    display:block;
  }

  /* Estrellas canvas */
  canvas#stars{
    position:fixed;
    top:0;
    left:0;
    z-index:-1;
  }

  /* Rosas (se crean/destruyen por JS) */
  #rosas{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;
    overflow:hidden;
    z-index:3;
  }
  .rosa{
    position:absolute;
    top:-50px;
    font-size:24px;
    animation:caerRosa linear forwards;
  }
  @keyframes caerRosa{
    0%{ transform:translateY(-50px) rotate(0deg); opacity:1; }
    100%{ transform:translateY(110vh) rotate(360deg); opacity:0.9; }
  }

  /* Botón Risk visible solo en modo200 */
  .boton-risk{ display:none; }
  .modo200 .boton-risk { display:inline-block; }

  /* Responsividad mínima */
  @media (max-width:420px){
    h1{ font-size:40px; }
    .titulo-superior{ font-size:18px; }
    .botones{ gap:10px; }
    .boton{ padding:10px 18px; font-size:16px; }
    .barra{ height:18px; }
  }
</style>
</head>
<body>

  <canvas id="stars"></canvas>

  <div id="rosas"></div>

  <div class="main-wrap">
    <div class="titulo-superior">Bruno Mars Concierto en el Estadio GNP Seguros</div>
    <h1>BRUNO MARS LIVE</h1>

    <div id="contador"></div>
    <div id="horaCDMX"></div>

    <div class="barra"><div class="progreso" id="progreso"></div></div>

    <div class="botones">
      <button class="boton">Liquor Store Blues</button>
      <button class="boton">Radio de Bruno Mars</button>
      <button class="boton">I Just Might</button>

      <button class="boton boton-risk" onclick="window.open('https://www.youtube.com/watch?v=lY5V4hSLWY8','_blank')">Risk It All</button>

      <button class="boton-apt" onclick="window.open('https://www.youtube.com/watch?v=APTVideoID','_blank')">APT Oficial</button>
    </div>

    <div class="tv"><span>📺</span></div>
  </div>

  <div class="secreto">
    <button onclick="abrirSecreto()">🤫</button><br>
    <input id="codigoSecreto" placeholder="..." onkeydown="detectarEnter(event)">
  </div>

<script>
/* ---------- Estado del modo fijo (codigos) ---------- */
let modoFijo = null; // null = no modo fijado por código (funcionan modos automáticos)

/* ---------- Fechas / progreso ---------- */
const fechaObjetivo = new Date("December 8, 2026 14:30:00 GMT-0600").getTime();
const inicio = new Date("March 13, 2026").getTime();
const progresoEl = document.getElementById("progreso");
const starsCanvas = document.getElementById("stars");
const starsCtx = starsCanvas.getContext("2d");
const tvEl = document.querySelector('.tv');
const rosasContainer = document.getElementById('rosas');

/* Canvas tamaño */
function resizeCanvas(){
  starsCanvas.width = window.innerWidth;
  starsCanvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

/* ---------- Estrellas (solo se muestran en "modo estrellas") ---------- */
let estrellas = [];
function generarEstrellas(){
  estrellas = [];
  for(let i=0;i<200;i++){
    estrellas.push({ x: Math.random()*starsCanvas.width, y: Math.random()*starsCanvas.height, r: Math.random()*2 });
  }
}
generarEstrellas();
function animarEstrellas(){
  starsCtx.clearRect(0,0,starsCanvas.width,starsCanvas.height);
  starsCtx.fillStyle = "white";
  estrellas.forEach(e=>{
    starsCtx.beginPath();
    starsCtx.arc(e.x,e.y,e.r,0,Math.PI*2);
    starsCtx.fill();
    e.y += 0.2;
    if(e.y > starsCanvas.height) e.y = 0;
  });
  requestAnimationFrame(animarEstrellas);
}
animarEstrellas();

/* ---------- Rosas: se crean solo en modos show y modo200 (NO en modo50) ---------- */
function crearRosa(){
  const rosa = document.createElement('div');
  rosa.classList.add('rosa');
  rosa.innerHTML = "🌹";
  rosa.style.left = Math.random()*100 + "vw";
  rosa.style.animationDuration = (5 + Math.random()*5) + "s";
  rosa.style.fontSize = (20 + Math.random()*20) + "px";
  rosasContainer.appendChild(rosa);
  setTimeout(()=> rosa.remove(), 10000);
}
let rosasInterval = setInterval(()=> {
  // Solo crear rosas si estamos en modo show o modo200 (y no en modo50)
  if(document.body.classList.contains('show') || document.body.classList.contains('modo200')){
    crearRosa();
  }
}, 500);

/* ---------- Lógica del contador y modos ---------- */
function clamp(v, a, b){ return Math.min(Math.max(v,a),b); }

setInterval(function(){
  const ahora = Date.now();
  const diferencia = fechaObjetivo - ahora;
  const dias = Math.floor(diferencia / (1000*60*60*24));
  const horas = Math.floor((diferencia % (1000*60*60*24)) / (1000*60*60));
  const minutos = Math.floor((diferencia % (1000*60*60)) / (1000*60));
  const segundos = Math.floor((diferencia % (1000*60)) / 1000);

  document.getElementById('contador').textContent = dias + "d " + horas + "h " + minutos + "m " + segundos + "s";

  // Barra de progreso (funciona correctamente)
  const total = fechaObjetivo - inicio;
  const pasado = ahora - inicio;
  let percent = (pasado / total) * 100;
  percent = clamp(percent, 0, 100);
  progresoEl.style.width = percent + "%";

  // Limpiar clases de modos antes de decidir cuál aplicar
  document.body.classList.remove('show','modo200','modo50');

  // Mostrar/ocultar elementos estrellas/tele según estado final (se decide más abajo)
  // Por defecto, ocultamos stars y tv y los activamos solo si procede
  starsCanvas.style.display = 'none';
  tvEl.style.display = 'none';
  // Ocultar boton-apt por defecto
  document.querySelector('.boton-apt').style.display = 'none';

  // MODO AUTOMÁTICO solo si NO hay modo fijo activado por código
  if(!modoFijo){
    if(dias <= 50){
      document.body.classList.add('modo50');
      // boton apt visible en modo50
      document.querySelector('.boton-apt').style.display = 'inline-block';
    } else if(dias <= 100){
      document.body.classList.add('show'); // modo 100 días
    } else if(dias <= 200){
      document.body.classList.add('modo200');
    } else {
      // Ningún modo: esto significa "modo estrellas" (estado por defecto)
      // Lo dejamos sin clases y dejamos que se muestre canvas y tv.
    }
  } else {
    // Si hay modoFijo, aplicarlo y respetar sus visuales
    document.body.classList.add(modoFijo);
    if(modoFijo === 'modo50'){
      document.querySelector('.boton-apt').style.display = 'inline-block';
    }
  }

  // Decide si estamos en "modo estrellas" (ninguna de las clases aplicadas)
  const hasShow = document.body.classList.contains('show');
  const has200 = document.body.classList.contains('modo200');
  const has50 = document.body.classList.contains('modo50');
  const isStarsMode = !hasShow && !has200 && !has50 && !modoFijo;

  if(isStarsMode){
    // Mostrar canvas y tele
    starsCanvas.style.display = 'block';
    tvEl.style.display = 'block';
  } else {
    // En cualquier otro modo, ocultar canvas y tele
    starsCanvas.style.display = 'none';
    tvEl.style.display = 'none';
  }

  // NOTA: Rosas ya se crean solo para show/modo200 en el interval superior

  // Hora CDMX siempre justo debajo del contador (se muestra en todos los modos)
  const horaCDMX = new Date().toLocaleTimeString('es-MX', { timeZone: 'America/Mexico_City' });
  document.getElementById('horaCDMX').textContent = "CDMX: " + horaCDMX;

}, 1000);

/* ---------- Manejo de tamaño de canvas si cambia ventana (reanudar estrellas) ---------- */
window.addEventListener('resize', function(){
  resizeCanvas();
  generarEstrellas();
});

/* ---------- Códigos secretos: fijan modo hasta recarga ---------- */
function abrirSecreto(){ document.getElementById('codigoSecreto').focus(); }
function detectarEnter(e){
  if(e.key === "Enter"){
    const codigo = document.getElementById('codigoSecreto').value.trim().toLowerCase();
    // Por defecto reseteamos modoFijo, después asignamos según código
    // 'mars' = quitar modo fijo (volver a automático)
    if(codigo === 'justmight'){
      modoFijo = 'show'; // modo 100 días fijado
    } else if(codigo === 'riskitall'){
      modoFijo = 'modo200'; // modo 200 fijado
    } else if(codigo === 'apt'){
      modoFijo = 'modo50'; // modo 50 fijado
    } else if(codigo === 'mars'){
      modoFijo = null; // desbloquea el modo (vuelve a automático)
    } else {
      // código desconocido -> no cambiamos nada
      return;
    }
    // limpiar campo para UX
    document.getElementById('codigoSecreto').value = '';
    // aplicar inmediatamente (el setInterval se encargará de pintar)
  }
}

/* ---------- Prevención de creación de rosas si modo50: (ya cubierto) ---------- */
/* No se necesita acción adicional aquí; creación de rosas se controla en setInterval del bloque de rosas. */

</script>

</body>
</html>
