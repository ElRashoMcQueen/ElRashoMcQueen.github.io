<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial, sans-serif;
text-align:center;
overflow:hidden;
display:flex;
flex-direction:column;
align-items:center;
}

/* TEXTO SUPERIOR */

.titulo-superior{
margin-top:12px;
font-size:26px;
letter-spacing:2px;
}

/* TITULO */

h1{
font-size:58px;
margin:8px 0;
color:white;
-webkit-text-stroke:2px black;
text-shadow:0 0 10px black;
}

/* MODO 100 DIAS */

.show{
background:url("escenario.png") center center / cover no-repeat fixed;
color:#f4e3a3;
}

.show h1{
color:#f2d27c;
text-shadow:
2px 2px 0 #1f3d2b,
4px 4px 0 #000;
}

.show .titulo-superior{
color:#9bbf7a;
text-shadow:1px 1px 3px black;
}

/* MODO 50 DIAS */

.final{
background:url("silla50.png") center center / cover no-repeat fixed;
color:white;
}

.final h1{
color:#8b0000;
font-style:italic;
text-shadow:
2px 2px 0 black,
4px 4px 10px black;
}

.final .titulo-superior{
color:#8b0000;
font-style:italic;
}

.final #contador{
color:#8b0000;
font-style:italic;
}

/* CONTADOR */

#contador{
font-size:55px;
margin:10px;
}

/* BARRA */

.barra{
width:500px;
height:25px;
background:rgba(255,255,255,0.2);
border-radius:20px;
overflow:hidden;
margin:10px auto;
}

.progreso{
height:100%;
width:0%;
background:linear-gradient(90deg,#ff00ff,#ff4da6);
}

/* barra vintage */

.show .barra{
background:rgba(0,0,0,0.4);
}

.show .progreso{
background:linear-gradient(90deg,#9bbf7a,#d6b45f);
}

/* barra final */

.final .barra{
background:rgba(0,0,0,0.6);
}

.final .progreso{
background:linear-gradient(90deg,#8b0000,#ff0000);
}

/* BOTONES */

.botones{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:12px;
margin-top:20px;
}

.boton{
padding:12px 24px;
font-size:18px;
border-radius:20px;
border:none;
background:#ff4da6;
color:white;
cursor:pointer;
box-shadow:0 0 10px #ff4da6;
}

/* botones vintage */

.show .boton{
background:#c79a3b;
color:black;
box-shadow:0 0 8px #000;
border:2px solid #1f3d2b;
}

/* botones final */

.final .boton{
background:#8b0000;
color:white;
border:2px solid black;
font-style:italic;
box-shadow:0 0 10px black;
}

/* TV */

.tv span{
font-size:200px;
margin-top:15px;
}

.show .tv{
display:none;
}

.final .tv{
display:none;
}

/* ESTRELLAS */

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* ROSAS */

.rosa{
position:fixed;
font-size:28px;
animation:caer linear;
pointer-events:none;
}

@keyframes caer{

0%{
transform:translateY(-100px);
opacity:0;
}

10%{opacity:1}

100%{
transform:translateY(110vh);
opacity:0;
}

}

/* MOVIL */

@media (max-width:700px){

h1{font-size:34px;}

#contador{font-size:34px;}

.barra{width:90%;}

.boton{
font-size:16px;
padding:10px 16px;
}

.tv span{font-size:110px;}

}

</style>
</head>

<body>

<canvas id="stars"></canvas>

<div class="titulo-superior">
Bruno Mars Concierto en el Estadio
</div>

<h1>BRUNO MARS LIVE</h1>

<div id="contador"></div>

<div class="barra">
<div class="progreso" id="progreso"></div>
</div>

<div class="botones">

<button class="boton" onclick="video1()">Liquor Store Blues</button>
<button class="boton" onclick="video2()">Radio de Bruno Mars</button>
<button class="boton" onclick="video3()">I Just Might</button>

</div>

<div class="tv">
<span>📺</span>
</div>

<script>

document.addEventListener("DOMContentLoaded", function(){

/* BOTONES */

window.video1=function(){
window.location.href="https://www.youtube.com/watch?v=1iBm60uJXvs";
}

window.video2=function(){
window.location.href="https://www.youtube.com/watch?v=4J41KdZ3JR8";
}

window.video3=function(){
window.location.href="https://www.youtube.com/watch?v=mrV8kK5t0V8";
}

/* CONTADOR */

const fechaObjetivo=new Date("December 8, 2026 14:30:00 GMT-0600").getTime();
const inicio=new Date("March 13, 2026").getTime();

const progreso=document.getElementById("progreso");

setInterval(function(){

const ahora=new Date().getTime();
const diferencia=fechaObjetivo-ahora;

const dias=Math.floor(diferencia/(1000*60*60*24));
const horas=Math.floor((diferencia%(1000*60*60*24))/(1000*60*60));
const minutos=Math.floor((diferencia%(1000*60*60))/(1000*60));
const segundos=Math.floor((diferencia%(1000*60))/1000);

document.getElementById("contador").innerHTML=
dias+"d "+horas+"h "+minutos+"m "+segundos+"s";

const total=fechaObjetivo-inicio;
const pasado=ahora-inicio;

const porcentaje=(pasado/total)*100;

progreso.style.width=porcentaje+"%";

/* MODOS */

if(dias<=50){
document.body.classList.add("final");
document.getElementById("stars").style.display="none";
}

else if(dias<=100){
document.body.classList.add("show");
document.getElementById("stars").style.display="none";
}

},1000);

/* ESTRELLAS */

const canvas=document.getElementById("stars");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}

resize();
window.addEventListener("resize",resize);

let estrellas=[];

for(let i=0;i<200;i++){
estrellas.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2
});
}

function animar(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="white";

estrellas.forEach(e=>{
ctx.beginPath();
ctx.arc(e.x,e.y,e.r,0,Math.PI*2);
ctx.fill();

e.y+=0.15;

if(e.y>canvas.height)e.y=0;
});

requestAnimationFrame(animar);

}

animar();

/* ROSAS */

function rosa(){

if(!document.body.classList.contains("show")) return;

const r=document.createElement("div");
r.className="rosa";
r.innerHTML="🌹";

r.style.left=Math.random()*100+"vw";

let duracion=6+Math.random()*4;

r.style.animationDuration=duracion+"s";

document.body.appendChild(r);

setTimeout(()=>{
r.remove();
},duracion*1000);

}

setInterval(rosa,700);

});

</script>

</body>
</html>
