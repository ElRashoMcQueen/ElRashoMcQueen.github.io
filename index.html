<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bruno Mars Countdown</title>

<link rel="icon" href="icono.png">

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial, sans-serif;
text-align:center;
overflow:hidden;
display:flex;
flex-direction:column;
align-items:center;
}

/* TEXTO SUPERIOR */

.titulo-superior{
margin-top:12px;
font-size:26px;
letter-spacing:2px;
}

/* TITULO */

h1{
font-size:58px;
margin:8px 0;
color:white;
-webkit-text-stroke:2px black;
text-shadow:0 0 10px black;
}

/* MODO SHOW */

.show{
background:url("escenario.png") center center / cover no-repeat fixed;
color:#f4e3a3;
}

.show h1{
color:#f2d27c;
text-shadow:
2px 2px 0 #1f3d2b,
4px 4px 0 #000;
}

.show .titulo-superior{
color:#9bbf7a;
text-shadow:1px 1px 3px black;
}

/* CONTADOR */

#contador{
font-size:55px;
margin:10px;
}

.show #contador{
color:#f2d27c;
-webkit-text-stroke:2px #1f3d2b;
text-shadow:
2px 2px 0 #1f3d2b,
4px 4px 0 #000;
}

/* HORA */

#horaCDMX{
font-size:22px;
margin-top:5px;
opacity:0.9;
}

.show #horaCDMX{
color:white;
-webkit-text-stroke:2px black;
text-shadow:0 0 10px black;
}

/* BARRA */

.barra{
width:500px;
height:25px;
background:rgba(255,255,255,0.2);
border-radius:20px;
overflow:hidden;
margin:10px auto;
}

.progreso{
height:100%;
width:0%;
background:linear-gradient(90deg,#ff00ff,#ff4da6);
}

.show .barra{
background:rgba(0,0,0,0.4);
}

.show .progreso{
background:linear-gradient(90deg,#9bbf7a,#d6b45f);
}

/* BOTONES */

.botones{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:12px;
margin-top:20px;
}

.boton{
padding:12px 24px;
font-size:18px;
border-radius:20px;
border:none;
background:#ff4da6;
color:white;
cursor:pointer;
box-shadow:0 0 10px #ff4da6;
}

.show .boton{
background:#c79a3b;
color:black;
box-shadow:0 0 8px #000;
border:2px solid #1f3d2b;
}

/* TV */

.tv span{
font-size:200px;
margin-top:15px;
}

.show .tv{
display:none;
}

/* ESTRELLAS */

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* ===================== */
/* MODO 200 DIAS */
/* ===================== */

.modo200{
background:url("silla50.png") center center / cover no-repeat fixed;
}

.modo200 h1{
color:#ff2b2b;
-webkit-text-stroke:2px black;
text-shadow:2px 2px 0 black;
}

.modo200 .titulo-superior{
color:#00ffaa;
-webkit-text-stroke:1px black;
}

.modo200 #contador{
color:#55cfff;
-webkit-text-stroke:2px black;
text-shadow:2px 2px 0 black;
}

.modo200 #horaCDMX{
color:white;
-webkit-text-stroke:0;
text-shadow:none;
}

.modo200 .barra{
background:rgba(0,0,0,0.4);
}

.modo200 .progreso{
background:linear-gradient(
90deg,
#ff0000,
#ff3b3b,
#ff0000,
#ff6a00
);
box-shadow:
0 0 10px red,
0 0 20px red,
0 0 30px red;
}

.modo200 .boton{
background:linear-gradient(
90deg,
#ff0000,
#ff3b3b,
#ff0000,
#ff6a00
);
color:white;
box-shadow:
0 0 10px red,
0 0 20px red;
border:2px solid black;
}

.modo200 canvas{
display:none;
}

.modo200 .tv{
display:none;
}

/* MOVIL */

@media (max-width:700px){

h1{font-size:34px;}
#contador{font-size:34px;}
.barra{width:90%;}

.boton{
font-size:16px;
padding:10px 16px;
}

}

/* ===================== */
/* CODIGO SECRETO */
/* ===================== */

.secreto{
position:fixed;
bottom:15px;
right:15px;
background:transparent;
z-index:1000;
text-align:right;
}

.secreto input{
background:transparent;
border:1px solid rgba(255,255,255,0.4);
color:white;
padding:4px 6px;
border-radius:6px;
outline:none;
}

.secreto button{
background:transparent;
border:none;
font-size:18px;
cursor:pointer;
}

</style>
</head>

<body>

<canvas id="stars"></canvas>

<div class="titulo-superior">
Bruno Mars Concierto en el Estadio GNP Seguros
</div>

<h1>BRUNO MARS LIVE</h1>

<div id="contador"></div>

<div id="horaCDMX"></div>

<div class="barra">
<div class="progreso" id="progreso"></div>
</div>

<div class="botones">

<button class="boton" onclick="video1()">Liquor Store Blues</button>
<button class="boton" onclick="video2()">Radio de Bruno Mars</button>
<button class="boton" onclick="video3()">I Just Might</button>

</div>

<div class="tv">
<span>📺</span>
</div>

<div class="secreto">
<button onclick="abrirSecreto()">🤫</button><br>
<input id="codigoSecreto" placeholder="..." onkeydown="detectarEnter(event)">
</div>

<script>

/* TODO EL SCRIPT ES EXACTAMENTE EL MISMO QUE YA TENIAS */

</script>

</body>
</html>
